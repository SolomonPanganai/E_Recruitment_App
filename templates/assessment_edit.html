{% extends "base.html" %}

{% block title %}Edit Assessment - {{ assessment.title }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-1">
                            <li class="breadcrumb-item"><a href="{{ url_for('hr.assessments_list') }}">Assessments</a></li>
                            <li class="breadcrumb-item"><a href="{{ url_for('hr.assessment_detail', assessment_id=assessment.id) }}">{{ assessment.title }}</a></li>
                            <li class="breadcrumb-item active">Edit</li>
                        </ol>
                    </nav>
                    <h1 class="h3 mb-0"><i class="bi bi-pencil me-2"></i>Edit Assessment</h1>
                </div>
                <a href="{{ url_for('hr.assessment_detail', assessment_id=assessment.id) }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </a>
            </div>

            <form method="POST" class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Job Posting</label>
                        <input type="text" class="form-control" value="{{ assessment.job.title }} ({{ assessment.job.job_reference }})" disabled>
                        <div class="form-text">Job cannot be changed after creation.</div>
                    </div>

                    <div class="mb-3">
                        <label for="title" class="form-label">Assessment Title <span class="text-danger">*</span></label>
                        <input type="text" name="title" id="title" class="form-control" 
                               value="{{ assessment.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea name="description" id="description" class="form-control" rows="3">{{ assessment.description or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="instructions" class="form-label">Instructions for Candidates</label>
                        <textarea name="instructions" id="instructions" class="form-control" rows="4">{{ assessment.instructions or '' }}</textarea>
                    </div>

                    <hr class="my-4">
                    <h5 class="mb-3">Settings</h5>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="time_limit_minutes" class="form-label">Time Limit (minutes)</label>
                            <input type="number" name="time_limit_minutes" id="time_limit_minutes" 
                                   class="form-control" min="0" 
                                   value="{{ assessment.time_limit_minutes or '' }}"
                                   placeholder="Leave blank for no limit">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="pass_score" class="form-label">Pass Score (%)</label>
                            <input type="number" name="pass_score" id="pass_score" class="form-control" 
                                   min="0" max="100" value="{{ assessment.pass_score }}" step="0.1">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="max_attempts" class="form-label">Max Attempts</label>
                            <input type="number" name="max_attempts" id="max_attempts" class="form-control" 
                                   min="1" max="10" value="{{ assessment.max_attempts }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="shuffle_questions" id="shuffle_questions" 
                                       class="form-check-input" {% if assessment.shuffle_questions %}checked{% endif %}>
                                <label class="form-check-label" for="shuffle_questions">Shuffle Questions</label>
                            </div>
                        </div>

                        <div class="col-md-3 mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="show_results_immediately" id="show_results_immediately" 
                                       class="form-check-input" {% if assessment.show_results_immediately %}checked{% endif %}>
                                <label class="form-check-label" for="show_results_immediately">Show Results</label>
                            </div>
                        </div>

                        <div class="col-md-3 mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="is_mandatory" id="is_mandatory" 
                                       class="form-check-input" {% if assessment.is_mandatory %}checked{% endif %}>
                                <label class="form-check-label" for="is_mandatory">Mandatory</label>
                            </div>
                        </div>

                        <div class="col-md-3 mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="is_active" id="is_active" 
                                       class="form-check-input" {% if assessment.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="is_active">Active</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer bg-light d-flex justify-content-between">
                    <form method="POST" action="{{ url_for('hr.delete_assessment', assessment_id=assessment.id) }}"
                          onsubmit="return confirm('Are you sure you want to delete this assessment? This cannot be undone.');">
                        <button type="submit" class="btn btn-outline-danger">
                            <i class="bi bi-trash me-1"></i>Delete Assessment
                        </button>
                    </form>
                    <div>
                        <a href="{{ url_for('hr.assessment_detail', assessment_id=assessment.id) }}" class="btn btn-outline-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Save Changes
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
