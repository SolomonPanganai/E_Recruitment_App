<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Message</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #0d6efd; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f8f9fa; padding: 20px; border-radius: 0 0 8px 8px; }
        .message-box { background: white; padding: 15px; border-radius: 5px; margin: 15px 0; border-left: 4px solid #0d6efd; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #666; }
        .btn { display: inline-block; background: #0d6efd; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>New Message</h1>
        </div>
        <div class="content">
            <p>You have received a new message from <strong>{{ sender.full_name }}</strong>.</p>
            
            <div class="message-box">
                <p><strong>Subject:</strong> {{ subject }}</p>
                <hr>
                <div style="white-space: pre-wrap;">{{ body }}</div>
            </div>
            
            <p>Log in to your account to view and reply to this message.</p>
            
            <p style="text-align: center;">
                <a href="#" class="btn">View Message</a>
            </p>
        </div>
        <div class="footer">
            <p>This is an automated message from the E-Recruitment Portal.</p>
            <p>Please do not reply directly to this email.</p>
        </div>
    </div>
</body>
</html>
