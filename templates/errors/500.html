{% extends "base.html" %}

{% block title %}Server Error - E-Recruitment Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <h1 class="display-1 text-danger">500</h1>
        <h2 class="mb-3">Something Went Wrong</h2>
        <p class="text-muted mb-4">
            We're experiencing technical difficulties. Please try again later or contact support if the problem persists.
        </p>
        <div class="d-grid gap-2 d-md-block">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                <i class="bi bi-house"></i> Go Home
            </a>
            <a href="{{ url_for('main.contact') }}" class="btn btn-outline-primary">
                <i class="bi bi-envelope"></i> Contact Support
            </a>
        </div>
    </div>
</div>
{% endblock %}
