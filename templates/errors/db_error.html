<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Unavailable - E-Recruitment Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { max-width: 540px; }
        .icon-pulse { animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card error-card shadow-sm mx-auto text-center p-5">
            <div class="mb-4">
                <i class="bi bi-database-exclamation text-warning icon-pulse" style="font-size: 4rem;"></i>
            </div>
            <h2 class="mb-3">Service Temporarily Unavailable</h2>
            <p class="text-muted mb-4">
                We're having trouble connecting to our database server. This is usually temporary.
            </p>
            <hr>
            <h6 class="text-secondary mb-3">What you can do:</h6>
            <ul class="list-unstyled text-muted text-start mx-auto" style="max-width: 360px;">
                <li class="mb-2"><i class="bi bi-arrow-clockwise me-2"></i>Wait a moment and refresh this page</li>
                <li class="mb-2"><i class="bi bi-clock-history me-2"></i>Try again in a few minutes</li>
                <li class="mb-2"><i class="bi bi-envelope me-2"></i>Contact IT support if the issue persists</li>
            </ul>
            <div class="mt-4">
                <button onclick="location.reload()" class="btn btn-primary">
                    <i class="bi bi-arrow-clockwise me-1"></i> Try Again
                </button>
            </div>
            <p class="text-muted small mt-4 mb-0">E-Recruitment Portal</p>
        </div>
    </div>
</body>
</html>
